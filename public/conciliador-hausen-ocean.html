<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Conciliador Hausen e Ocean</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="app-body nfe-body">
    <div class="nfe-layout">
      <aside class="nfe-sidebar">
        <div class="nfe-sidebar-top">
          <div class="nfe-sidebar-logo">
            <span class="logo-circle">WL</span>
            <span class="logo-text">Portal</span>
          </div>
          <button class="nfe-sidebar-toggle" id="sidebarToggle" type="button">
            <span></span><span></span><span></span>
          </button>
        </div>
        <nav class="nfe-sidebar-menu" id="sidebarMenu"></nav>
      </aside>

      <main class="nfe-main">
        <header class="nfe-header">
          <h1>Conciliador Hausen e Ocean</h1>
          <p>Merge arquivos excel do DRE e Balancetes das duas empresas.</p>

          <div class="nfe-table-actions">
            <button class="btn btn-primary" id="btnGenerate">Gerar</button>
          </div>

          <div id="whoami" class="nfe-card-subtitle" style="margin-top: 8px"></div>
          <div id="status" class="nfe-card-subtitle" style="margin-top: 4px"></div>
        </header>

        <section class="nfe-card">
          <div class="nfe-card-header">
            <h2>Tipo</h2>
            <p class="nfe-card-subtitle">Selecione se é DRE ou Balancete.</p>
          </div>
          <div class="nfe-card-body">
            <div class="wl-upload-area" style="display: flex; gap: 12px; flex-wrap: wrap;">
              <label class="nfe-input-file-label" style="cursor: pointer;">
                <input type="radio" name="tipo" value="dre" checked />
                <span>DRE</span>
              </label>
              <label class="nfe-input-file-label" style="cursor: pointer;">
                <input type="radio" name="tipo" value="balancete" />
                <span>Balancete</span>
              </label>
            </div>
          </div>
        </section>

        <section class="nfe-card">
          <div class="nfe-card-header">
            <h2>Upload</h2>
            <p class="nfe-card-subtitle">Envie exatamente 2 arquivos Excel.</p>
          </div>
          <div class="nfe-card-body">
            <div class="wl-upload-area">
              <label class="nfe-input-file-label" for="filesInput">
                <input
                  id="filesInput"
                  type="file"
                  multiple
                  data-wl-primary-upload="1"
                  accept=".xlsx,.xls,.xlsm,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
                />
                <span>Selecionar 2 arquivos</span>
              </label>
              <div class="wl-upload-summary"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/sidebar.js"></script>
    <script src="/js/upload-helper.js"></script>
    <script src="/js/auth-client.js"></script>
    <script src="/js/conciliador-hausen-ocean.js"></script>
  </body>
</html>
